<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Motorbike Parqueadero
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f3f5f7;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI';
        }

        .card-login{
            width:400px;
            border:none;
            border-radius:22px;
            box-shadow:0 10px 35px rgba(0,0,0,.08);
        }

        .btn-login{
            background:#eb0413;
            border:none;
            border-radius:12px;
            font-weight:bold;
            padding:12px;
        }

        .btn-login:hover{
            background:#c7000d;
        }

        .logo{
            width:180px;
        }

        .titulo{
            font-weight:bold;
            color:#1f2a36;
        }

    </style>

<meta name="csrf-token" content="{{ csrf_token() }}">
<script src="{{ url_for('static', filename='js/csrf.js') }}" defer></script>

</head>

<body>

<div class="card card-login p-4">

    <!-- LOGO -->
    <div class="text-center">

        <img src="{{ url_for('static', filename='img/logocolor.png') }}"
             class="logo">

        <h3 class="titulo mt-3">
            Motorbike Parqueadero
        </h3>

        <p class="text-muted">
            Sistema de acceso
        </p>

    </div>

    <!-- FORMULARIO -->
    <form method="POST">

        <!-- USUARIO -->
        <div class="mb-3">

            <label class="mb-1 fw-semibold">
                Usuario
            </label>

            <input type="text"
                   name="usuario"
                   required
                   class="form-control form-control-lg">

        </div>

        <!-- PASSWORD -->
        <div class="mb-4">

            <label class="mb-1 fw-semibold">
                Contraseña
            </label>

            <input type="password"
                   name="password"
                   required
                   class="form-control form-control-lg">

        </div>

        <!-- BOTON -->
        <button class="btn btn-danger btn-lg w-100 btn-login">

            Ingresar

        </button>

        <!-- ERROR -->
        {% if error %}

        <div class="alert alert-danger mt-3">

            {{ error }}

        </div>

        {% endif %}

    </form>

</div>

</body>
</html>
