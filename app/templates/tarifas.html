<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Configuración Tarifas

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

</head>

<body class="bg-light">

<div class="container mt-4 mb-5">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3 class="mb-0">

                <i class="bi bi-cash-coin"></i>

                Configuración de Tarifas

            </h3>

        </div>

        <div class="card-body">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}

                    {% for category, message in messages %}

                        <div class="alert alert-success">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}
            {% endwith %}

            <form method="POST">

                <div class="row">

                    <!-- MOTO -->
                    <div class="col-md-6">

                        <h4 class="mb-3">

                            Moto

                        </h4>

                        <div class="mb-3">

                            <label class="form-label">

                                Valor Hora

                            </label>

                            <input
                                type="number"
                                name="hora_moto"
                                class="form-control"
                                value="{{ tarifas.hora_moto }}"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Tarifa Día

                            </label>

                            <input
                                type="number"
                                name="dia_moto"
                                class="form-control"
                                value="{{ tarifas.dia_moto }}"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Tarifa Noche

                            </label>

                            <input
                                type="number"
                                name="noche_moto"
                                class="form-control"
                                value="{{ tarifas.noche_moto }}"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Mensualidad

                            </label>

                            <input
                                type="number"
                                name="mensualidad_moto"
                                class="form-control"
                                value="{{ tarifas.mensualidad_moto }}"
                                required
                            >

                        </div>

                    </div>

                    <!-- CARRO -->
                    <div class="col-md-6">

                        <h4 class="mb-3">

                            Carro

                        </h4>

                        <div class="mb-3">

                            <label class="form-label">

                                Valor Hora

                            </label>

                            <input
                                type="number"
                                name="hora_carro"
                                class="form-control"
                                value="{{ tarifas.hora_carro }}"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Tarifa Día

                            </label>

                            <input
                                type="number"
                                name="dia_carro"
                                class="form-control"
                                value="{{ tarifas.dia_carro }}"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Tarifa Noche

                            </label>

                            <input
                                type="number"
                                name="noche_carro"
                                class="form-control"
                                value="{{ tarifas.noche_carro }}"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Mensualidad

                            </label>

                            <input
                                type="number"
                                name="mensualidad_carro"
                                class="form-control"
                                value="{{ tarifas.mensualidad_carro }}"
                                required
                            >

                        </div>

                    </div>

                </div>

                <hr>

                <div class="row">

                    <div class="col-md-4">

                        <label class="form-label">

                            Minutos de gracia

                        </label>

                        <input
                            type="number"
                            name="minutos_gracia"
                            class="form-control"
                            value="{{ tarifas.minutos_gracia }}"
                            required
                        >

                    </div>

                </div>

                <hr>

                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-success"
                    >

                        <i class="bi bi-save"></i>

                        Guardar Cambios

                    </button>

                    <a
                        href="/dashboard/parqueadero"
                        class="btn btn-secondary"
                    >

                        Volver

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
