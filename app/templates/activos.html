<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vehículos Activos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <meta http-equiv="refresh" content="30">

</head>

<body class="bg-dark">

    <div class="container-fluid mt-4">

        <div class="card shadow-lg border-0">

            <div class="card-header bg-danger text-white">

                <div class="d-flex justify-content-between align-items-center">

                    <h3 class="mb-0">
                        Vehículos Activos
                    </h3>

                    <a href="/dashboard/parqueadero" class="btn btn-dark">
                        Volver
                    </a>

                </div>

            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover table-bordered align-middle">

                        <thead class="table-dark text-center">

                            <tr>

                                <th>ID</th>
                                <th>Placa</th>
                                <th>Tipo</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Tiempo</th>
                                <th>Acciones</th>

                            </tr>

                        </thead>

                        <tbody class="text-center">

                            {% for vehiculo in activos %}

                            <tr>

                                <td>{{ vehiculo.id }}</td>

                                <td class="fw-bold">
                                    {{ vehiculo.placa }}
                                </td>

                                <td>
                                    {{ vehiculo.tipo }}
                                </td>

                                <td>
                                    {{ vehiculo.fecha }}
                                </td>

                                <td>
                                    {{ vehiculo.hora }}
                                </td>

                                <td>

                                    <span class="badge bg-success fs-6">

                                        {{ vehiculo.tiempo }}

                                    </span>

                                </td>

                                <td>

                                    <div class="d-flex justify-content-center gap-2">

                                        <!-- BOTON EDITAR -->

                                        <button
                                            class="btn btn-warning btn-sm"
                                            data-bs-toggle="modal"
                                            data-bs-target="#editarModal{{ vehiculo.id }}"
                                        >

                                            Editar

                                        </button>

                                        <!-- BOTON ELIMINAR -->

                                        <a
                                            href="/eliminar/{{ vehiculo.id }}"
                                            class="btn btn-danger btn-sm"
                                            onclick="return confirm('¿Eliminar vehículo?')"
                                        >

                                            Eliminar

                                        </a>

                                    </div>

                                </td>

                            </tr>

                            <!-- MODAL EDITAR -->

                            <div
                                class="modal fade"
                                id="editarModal{{ vehiculo.id }}"
                                tabindex="-1"
                            >

                                <div class="modal-dialog">

                                    <div class="modal-content">

                                        <div class="modal-header bg-warning">

                                            <h5 class="modal-title">

                                                Editar Vehículo

                                            </h5>

                                            <button
                                                type="button"
                                                class="btn-close"
                                                data-bs-dismiss="modal"
                                            ></button>

                                        </div>

                                        <form
                                            method="POST"
                                            action="/editar/{{ vehiculo.id }}"
                                        >

                                            <div class="modal-body">

                                                <div class="mb-3">

                                                    <label class="form-label">

                                                        Placa

                                                    </label>

                                                    <input
                                                        type="text"
                                                        name="placa"
                                                        class="form-control"
                                                        value="{{ vehiculo.placa }}"
                                                        required
                                                    >

                                                </div>

                                                <div class="mb-3">

                                                    <label class="form-label">

                                                        Tipo

                                                    </label>

                                                    <select
                                                        name="tipo"
                                                        class="form-select"
                                                    >

                                                        <option
                                                            value="Moto"
                                                            {% if vehiculo.tipo == 'Moto' %}
                                                            selected
                                                            {% endif %}
                                                        >

                                                            Moto

                                                        </option>

                                                        <option
                                                            value="Carro"
                                                            {% if vehiculo.tipo == 'Carro' %}
                                                            selected
                                                            {% endif %}
                                                        >

                                                            Carro

                                                        </option>

                                                    </select>

                                                </div>

                                            </div>

                                            <div class="modal-footer">

                                                <button
                                                    type="button"
                                                    class="btn btn-secondary"
                                                    data-bs-dismiss="modal"
                                                >

                                                    Cancelar

                                                </button>

                                                <button
                                                    type="submit"
                                                    class="btn btn-warning"
                                                >

                                                    Guardar

                                                </button>

                                            </div>

                                        </form>

                                    </div>

                                </div>

                            </div>

                            {% endfor %}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
