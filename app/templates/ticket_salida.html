<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Ticket Salida
    </title>

    <style>

        body {

            font-family: Arial, sans-serif;

            width: 300px;

            margin: auto;

            text-align: center;

            color: #000;
        }

        .logo {

            width: 120px;

            margin-bottom: 10px;
        }

        .titulo {

            font-size: 20px;

            font-weight: bold;

            margin-bottom: 10px;
        }

        .linea {

            border-top: 1px dashed #000;

            margin: 12px 0;
        }

        .dato {

            display: flex;

            justify-content: space-between;

            margin: 8px 0;

            font-size: 15px;
        }

        .ticket {

            font-size: 28px;

            font-weight: bold;

            margin: 15px 0;
        }

        .total {

            font-size: 32px;

            font-weight: bold;

            margin-top: 20px;
        }

        .footer {

            margin-top: 20px;

            font-size: 12px;
        }

        @media print {

            body {

                width: 80mm;
            }

        }

    </style>

</head>

<body onload="window.print()">

    <img
        src="{{ url_for('static', filename='img/logo.png') }}"
        class="logo"
    >

    <div class="titulo">

        RECIBO SALIDA

    </div>

    <div class="linea"></div>

    <div class="ticket">

        #{{ ticket }}

    </div>

    <div class="linea"></div>

    <div class="dato">

        <span>
            PLACA
        </span>

        <strong>
            {{ placa }}
        </strong>

    </div>

    <div class="dato">

        <span>
            VEHÍCULO
        </span>

        <strong>
            {{ tipo }}
        </strong>

    </div>

    <div class="dato">

        <span>
            INGRESO
        </span>

        <strong>
            {{ hora_ingreso }}
        </strong>

    </div>

    <div class="dato">

        <span>
            SALIDA
        </span>

        <strong>
            {{ hora_salida }}
        </strong>

    </div>

    <div class="dato">

        <span>
            TIEMPO
        </span>

        <strong>
            {{ tiempo }}
        </strong>

    </div>

    <div class="linea"></div>

    <div class="total">

        $ {{ valor }}

    </div>

    <div class="linea"></div>

    <div class="footer">

        ¡Gracias por su visita!

        <br>

        ESPUMOSO MOTORBIKE WASH

    </div>

</body>

</html>
