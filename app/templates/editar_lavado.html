<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Editar Lavado
    </title>

    <!-- BOOTSTRAP -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- ICONOS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        body{
            background:#eef2f7;
            font-family:'Segoe UI';
            min-height:100vh;
        }

        .navbar{
            box-shadow:0 3px 15px rgba(0,0,0,.08);
        }

        .card-form{
            border:none;
            border-radius:24px;
            box-shadow:0 10px 25px rgba(0,0,0,.06);
            overflow:hidden;
        }

        .titulo{
            font-weight:700;
            color:#1e293b;
            font-size:28px;
        }

        .subtitulo{
            color:#64748b;
            font-size:14px;
        }

        .form-control,
        .form-select{
            border-radius:14px;
            padding:12px 14px;
            border:1px solid #dbe2ea;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:none;
            border-color:#212529;
        }

        .btn-custom{
            border:none;
            border-radius:14px;
            padding:12px;
            font-weight:600;
            transition:.2s;
        }

        .btn-custom:hover{
            transform:translateY(-2px);
        }

        .icon-header{
            width:70px;
            height:70px;
            background:#dbeafe;
            border-radius:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:32px;
            color:#2563eb;
        }

        .contenedor{
            min-height:calc(100vh - 80px);
            display:flex;
            align-items:center;
        }

        label{
            margin-bottom:6px;
            font-size:14px;
        }

    </style>

<meta name="csrf-token" content="{{ csrf_token() }}">
<script src="{{ url_for('static', filename='js/csrf.js') }}" defer></script>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4 py-3">

    <span class="navbar-brand fw-bold fs-5">

        Editar Lavado

    </span>

    <a href="/historial/lavadero"
       class="btn btn-outline-light">

        Volver

    </a>

</nav>

<!-- CONTENIDO -->
<div class="container contenedor">

    <div class="row justify-content-center w-100">

        <div class="col-lg-7">

            <div class="card card-form">

                <div class="card-body p-4 p-md-5">

                    <!-- HEADER -->
                    <div class="text-center mb-4">

                        <div class="d-flex justify-content-center mb-3">

                            <div class="icon-header">

                                <i class="bi bi-pencil-square"></i>

                            </div>

                        </div>

                        <h2 class="titulo mb-1">

                            Editar lavado

                        </h2>

                        <p class="subtitulo mb-0">

                            Actualiza la información del servicio

                        </p>

                    </div>

                    {% if error %}

                    <div class="alert alert-danger mb-4">

                        <i class="bi bi-exclamation-triangle-fill"></i>

                        {{ error }}

                    </div>

                    {% endif %}

                    <!-- FORM -->
                    <form method="POST">

                        <div class="row">

                            <!-- PLACA -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">

                                    Placa

                                </label>

                                <input
                                    type="text"
                                    name="placa"
                                    class="form-control text-uppercase"
                                    value="{{ lavado.placa }}"
                                    required
                                >

                            </div>

                            <!-- VEHICULO -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">

                                    Vehículo

                                </label>

                                <select
                                    name="vehiculo"
                                    class="form-select"
                                    required
                                >

                                    <option
                                        value="Moto"
                                        {% if lavado.vehiculo == "Moto" %}
                                            selected
                                        {% endif %}
                                    >

                                        Moto

                                    </option>

                                    <option
                                        value="Carro"
                                        {% if lavado.vehiculo == "Carro" %}
                                            selected
                                        {% endif %}
                                    >

                                        Carro

                                    </option>

                                </select>

                            </div>

                            <!-- RESPONSABLE -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">

                                    Responsable

                                </label>

                                <select
                                    name="responsable"
                                    class="form-select"
                                    required
                                >

                                    <option
                                        value="Angela"
                                        {% if lavado.responsable == "Angela" %}
                                            selected
                                        {% endif %}
                                    >

                                        Angela

                                    </option>

                                    <option
                                        value="Angelica"
                                        {% if lavado.responsable == "Angelica" %}
                                            selected
                                        {% endif %}
                                    >

                                        Angelica

                                    </option>

                                    <option
                                        value="Angie"
                                        {% if lavado.responsable == "Angie" %}
                                            selected
                                        {% endif %}
                                    >

                                        Angie

                                    </option>

                                    <option
                                        value="Karime"
                                        {% if lavado.responsable == "Karime" %}
                                            selected
                                        {% endif %}
                                    >

                                        Karime

                                    </option>

                                </select>

                            </div>

                            <!-- SERVICIO -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-bold">

                                    Servicio realizado

                                </label>

                                <input
                                    type="text"
                                    name="tipo_lavado"
                                    class="form-control"
                                    value="{{ lavado.tipo_lavado }}"
                                    required
                                >

                            </div>

                            <!-- VALOR -->
                            <div class="col-12 mb-4">

                                <label class="form-label fw-bold">

                                    Valor

                                </label>

                                <input
                                    type="number"
                                    name="valor"
                                    class="form-control"
                                    value="{{ lavado.valor }}"
                                    required
                                >

                            </div>

                        </div>

                        <!-- BOTONES -->
                        <div class="row">

                            <!-- GUARDAR -->
                            <div class="col-md-6 mb-2">

                                <button
                                    type="submit"
                                    class="btn btn-primary w-100 btn-custom"
                                >

                                    <i class="bi bi-save"></i>

                                    Guardar cambios

                                </button>

                            </div>

                            <!-- CANCELAR -->
                            <div class="col-md-6 mb-2">

                                <a href="/historial/lavadero"
                                   class="btn btn-dark w-100 btn-custom">

                                    <i class="bi bi-x-circle"></i>

                                    Cancelar

                                </a>

                            </div>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
