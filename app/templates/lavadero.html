<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Registrar Lavado

    </title>

    <!-- BOOTSTRAP -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- ICONOS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        body{

            background:#eef2f7;

            font-family:'Segoe UI';

            min-height:100vh;
        }

        .navbar{

            box-shadow:0 3px 15px rgba(0,0,0,.08);
        }

        .card-form{

            border:none;

            border-radius:24px;

            box-shadow:0 10px 25px rgba(0,0,0,.06);

            overflow:hidden;
        }

        .titulo{

            font-weight:700;

            color:#1e293b;

            font-size:28px;
        }

        .subtitulo{

            color:#64748b;

            font-size:14px;
        }

        .form-control,
        .form-select{

            border-radius:14px;

            padding:12px 14px;

            border:1px solid #dbe2ea;
        }

        .form-control:focus,
        .form-select:focus{

            box-shadow:none;

            border-color:#212529;
        }

        .btn-custom{

            border:none;

            border-radius:14px;

            padding:12px;

            font-weight:600;

            transition:.2s;
        }

        .btn-custom:hover{

            transform:translateY(-2px);
        }

        .icon-header{

            width:70px;

            height:70px;

            background:#fef3c7;

            border-radius:20px;

            display:flex;

            align-items:center;

            justify-content:center;

            font-size:32px;

            color:#d97706;
        }

        .contenedor{

            min-height:calc(100vh - 80px);

            display:flex;

            align-items:center;
        }

        .reloj{

            background:white;

            padding:10px 16px;

            border-radius:12px;

            box-shadow:0 8px 20px rgba(0,0,0,.06);

            font-weight:600;
        }

        label{

            margin-bottom:6px;

            font-size:14px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4 py-3">

    <span class="navbar-brand fw-bold fs-5">

        Registro Lavadero

    </span>

    <a
        href="/dashboard/lavadero"
        class="btn btn-outline-light"
    >

        Volver

    </a>

</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-end mb-3">

        <div class="reloj">

            <i class="bi bi-clock"></i>

            <span id="fechaHora"></span>

        </div>

    </div>

</div>

<div class="container contenedor">

    <div class="row justify-content-center w-100">

        <div class="col-lg-7">

            <div class="card card-form">

                <div class="card-body p-4 p-md-5">

                    <div class="text-center mb-4">

                        <div class="d-flex justify-content-center mb-3">

                            <div class="icon-header">

                                <i class="bi bi-droplet-half"></i>

                            </div>

                        </div>

                        <h2 class="titulo">

                            Registrar lavado

                        </h2>

                        <p class="subtitulo">

                            Ingresa la información del servicio realizado

                        </p>

                    </div>

                    <div
    
                        id="mensajeExito"
                        class="alert alert-success d-none mb-4"
>

                        <i class="bi bi-check-circle-fill"></i>

                        Lavado registrado correctamente

                    </div>


                    <form id="formLavado">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="fw-bold">

                                    Placa

                                </label>

                                <input
                                    id="placa"
                                    type="text"
                                    name="placa"
                                    class="form-control text-uppercase"
                                    maxlength="10"
                                    autocomplete="off"
                                    required
                                >

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="fw-bold">

                                    Vehículo

                                </label>

                                <select
                                    name="vehiculo"
                                    class="form-select"
                                    required
                                >

                                    <option value="">
                                        Seleccionar
                                    </option>

                                    <option value="Moto">
                                        Moto
                                    </option>

                                    <option value="Carro">
                                        Carro
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="fw-bold">

                                    Responsable

                                </label>

                                <select
                                    name="responsable"
                                    class="form-select"
                                    required
                                >

                                    <option value="">
                                        Seleccionar
                                    </option>

                                    <option value="Angela">
                                        Angela
                                    </option>

                                    <option value="Angelica">
                                        Angelica
                                    </option>

                                    <option value="Angie">
                                        Angie
                                    </option>

                                    <option value="Karime">
                                        Karime
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="fw-bold">

                                    Servicio realizado

                                </label>

                                <input
                                    type="text"
                                    name="tipo_lavado"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="col-12 mb-4">

                                <label class="fw-bold">

                                    Valor

                                </label>

                                <input
                                    id="valor"
                                    type="text"
                                    class="form-control"
                                    placeholder="15.000"
                                    required
                                >

                                <input
                                    type="hidden"
                                    id="valor_real"
                                    name="valor"
                                >

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-2">

                                <button
                                    type="submit"
                                    class="btn btn-warning w-100 btn-custom text-dark"
                                >

                                    <i class="bi bi-check-circle"></i>

                                    Registrar lavado

                                </button>

                            </div>

                            <div class="col-md-6 mb-2">

                                <a
                                    href="/dashboard/lavadero"
                                    class="btn btn-dark w-100 btn-custom"
                                >

                                    <i class="bi bi-arrow-left-circle"></i>

                                    Cancelar

                                </a>

                            </div>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

// ==========================================
// RELOJ
// ==========================================
function actualizarFechaHora(){

    const ahora = new Date();

    document.getElementById(
        "fechaHora"
    ).innerHTML =

        ahora.toLocaleString(
            "es-CO"
        );
}

actualizarFechaHora();

setInterval(
    actualizarFechaHora,
    1000
);


// ==========================================
// FOCUS PLACA
// ==========================================
document.getElementById(
    "placa"
).focus();


// ==========================================
// MAYUSCULAS
// ==========================================
document.getElementById(
    "placa"
).addEventListener(
    "input",
    function(){

        this.value = this.value
            .toUpperCase()
            .replace(
                /[^A-Z0-9]/g,
                ""
            );
    }
);


// ==========================================
// FORMATO MONEDA
// ==========================================
const valorInput =
    document.getElementById(
        "valor"
    );

const valorReal =
    document.getElementById(
        "valor_real"
    );

valorInput.addEventListener(
    "input",
    function(){

        let numero = this.value
            .replace(/\D/g, "");

        valorReal.value = numero;

        this.value =
            Number(numero || 0)
            .toLocaleString(
                "es-CO"
            );
    }
);

</script>
<script src="/static/js/tickets_base.js"></script>
<script src="/static/js/tickets_lavadero.js"></script>
<script>

const formLavado =
    document.getElementById(
        "formLavado"
    );

formLavado.addEventListener(
    "submit",
    async function(e){

        e.preventDefault();

        try{

            const formData =
                new FormData(
                    formLavado
                );

            const response =
                await fetch(

                    "/registrar_lavado",

                    {
                        method:"POST",

                        body:formData
                    }
                );

            const data =
                await response.json();

            if(
                !data.success
            ){

                alert(
                    "Error al registrar lavado"
                );

                return;
            }
            
            // SONIDO
            new Audio(
                "/static/audio/success.mp3"
            ).play();


            // MENSAJE EXITO
            const mensaje =
                document.getElementById(
                    "mensajeExito"
            );

            mensaje.innerHTML =

                `<i class="bi bi-check-circle-fill"></i>
                Lavado ${data.placa} registrado correctamente`;

            mensaje.classList.remove(
                "d-none"
            );

            setTimeout(() => {

                mensaje.classList.add(
                    "d-none"
            );

            }, 3000);


            // IMPRIMIR TICKET
            abrirTicketLavadero(

                generarTicketLavadero(
                    data
                )
            );


            // LIMPIAR FORMULARIO
            formLavado.reset();

            document
                .getElementById(
                    "placa"
                )
                .focus();


        }
        catch(error){

            console.error(
                "ERROR LAVADERO:",
                error
            );

            alert(

                "Error:\n\n" +

                error.message +

                "\n\nRevise la consola (F12)."
            );
        }
    }
);

</script>
</body>

</html>
