<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Ingreso Vehículo
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-dark">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card shadow-lg border-0">

                    <div class="card-header bg-danger text-white text-center">

                        <h3>
                            Registrar Ingreso
                        </h3>

                    </div>

                    <div class="card-body">

                        <div
                            id="alerta"
                            style="display:none;"
                        ></div>

                        <form id="formIngreso">

                            <div class="mb-3">

                                <label class="form-label">
                                    Placa
                                </label>

                                <input
                                    type="text"
                                    name="placa"
                                    id="placa"
                                    class="form-control"
                                    required
                                    autofocus
                                    autocomplete="off"
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Tipo Vehículo
                                </label>

                                <select
                                    name="tipo"
                                    class="form-select"
                                >

                                    <option value="Moto">
                                        Moto
                                    </option>

                                    <option value="Carro">
                                        Carro
                                    </option>

                                </select>

                            </div>

                            <div class="d-grid gap-2">

                                <button
                                    type="submit"
                                    class="btn btn-danger"
                                >

                                    Registrar

                                </button>

                                <a
                                    href="/dashboard/parqueadero"
                                    class="btn btn-dark"
                                >

                                    Volver

                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        const form = document.getElementById(
            "formIngreso"
        );

        form.addEventListener(
            "submit",
            async function(e) {

                e.preventDefault();

                const formData = new FormData(form);

                const response = await fetch(
                    "/registrar_ingreso",
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await response.json();

                const alerta = document.getElementById(
                    "alerta"
                );

                // ==========================================
                // ERROR
                // ==========================================
                if (!data.success) {

                    alerta.style.display = "block";

                    alerta.className =
                        "alert alert-danger";

                    alerta.innerHTML =
                        data.message;

                    return;
                }

                // ==========================================
                // TICKET HTML
                // ==========================================
                const ticketHTML = `

                    <html>

                    <head>

                        <title>
                            Ticket Ingreso
                        </title>

                        <style>

                            body {

                                font-family: Arial;

                                width: 300px;

                                margin: auto;

                                text-align: center;
                            }

                            .logo {

                                width: 120px;

                                margin-bottom: 10px;
                            }

                            .ticket {

                                font-size: 28px;

                                font-weight: bold;

                                margin: 15px 0;
                            }

                            .linea {

                                border-top: 1px dashed #000;

                                margin: 12px 0;
                            }

                            .dato {

                                display: flex;

                                justify-content: space-between;

                                margin: 8px 0;
                            }

                        </style>

                    </head>

                    <body onload="window.print()">

                        <img
                            src="/static/img/logo.png"
                            class="logo"
                        >

                        <h2>
                            RECIBO INGRESO
                        </h2>

                        <div class="linea"></div>

                        <div class="ticket">

                            #${data.ticket}

                        </div>

                        <div class="linea"></div>

                        <div class="dato">

                            <span>
                                PLACA
                            </span>

                            <strong>
                                ${data.placa}
                            </strong>

                        </div>

                        <div class="dato">

                            <span>
                                TIPO
                            </span>

                            <strong>
                                ${data.tipo}
                            </strong>

                        </div>

                        <div class="dato">

                            <span>
                                INGRESO
                            </span>

                            <strong>
                                ${data.hora}
                            </strong>

                        </div>

                        <div class="linea"></div>

                        <p>

                            ESPUMOSO MOTORBIKE WASH

                        </p>

                    </body>

                    </html>

                `;

                const ventana = window.open(
                    "",
                    "_blank",
                    "width=400,height=700"
                );

                ventana.document.write(
                    ticketHTML
                );

                ventana.document.close();

                // ==========================================
                // LIMPIAR
                // ==========================================
                form.reset();

                document.getElementById(
                    "placa"
                ).focus();

                alerta.style.display = "block";

                alerta.className =
                    "alert alert-success";

                alerta.innerHTML =
                    "Vehículo registrado correctamente";

            }
        );

    </script>

</body>

</html>
