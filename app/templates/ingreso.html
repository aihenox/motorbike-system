<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Registrar Ingreso
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        body{

            background:#f1f5f9;

            min-height:100vh;

            display:flex;

            align-items:center;

            justify-content:center;

            font-family:'Segoe UI';
        }

        .card-ingreso{

            border:none;

            border-radius:28px;

            overflow:hidden;

            box-shadow:0 18px 45px rgba(0,0,0,.18);

            width:100%;

            max-width:520px;
        }

        .header-card{

            background:#15803d;

            color:white;

            padding:28px;

            text-align:center;
        }

        .header-card h2{

            margin:0;

            font-weight:700;
        }

        .header-card p{

            margin-top:8px;

            margin-bottom:0;

            opacity:.9;
        }

        .body-card{

            padding:35px;
        }

        .form-label{

            font-weight:600;

            color:#334155;
        }

        .form-control,
        .form-select{

            border-radius:16px;

            padding:14px;

            border:2px solid #e2e8f0;

            font-size:17px;
        }

        .form-control:focus,
        .form-select:focus{

            border-color:#16a34a;

            box-shadow:0 0 0 .2rem rgba(22,163,74,.15);
        }

        .btn-custom{

            border:none;

            border-radius:16px;

            padding:14px;

            font-weight:600;

            font-size:16px;

            transition:.2s;
        }

        .btn-custom:hover{

            transform:translateY(-2px);
        }

        .btn-success-custom{

            background:#16a34a;

            color:white;
        }

        .btn-success-custom:hover{

            background:#15803d;

            color:white;
        }

        .btn-dark-custom{

            background:#0f172a;

            color:white;
        }

        .btn-dark-custom:hover{

            background:#020617;

            color:white;
        }

        .logo{

            width:120px;

            margin-bottom:18px;
        }

        .tip{

            background:#f0fdf4;

            border:1px solid #bbf7d0;

            color:#166534;

            padding:12px;

            border-radius:14px;

            font-size:14px;

            margin-top:20px;
        }

        .is-valid{

            border-color:#16a34a !important;
        }

        .reloj{

            position:absolute;

            top:20px;

            right:20px;

            background:white;

            padding:12px 18px;

            border-radius:14px;

            font-weight:600;

            box-shadow:0 8px 20px rgba(0,0,0,.12);

            color:#0f172a;
        }

    </style>

</head>

<body>

<!-- RELOJ -->
<div class="reloj">

    <i class="bi bi-clock"></i>

    <span id="fechaHora"></span>

</div>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <div class="card card-ingreso">

                <!-- HEADER -->
                <div class="header-card">

                    <img
                        src="/static/img/logo.png"
                        class="logo"
                    >

                    <h2>

                        Registrar Ingreso

                    </h2>

                    <p>

                        Sistema Parqueadero Motorbike

                    </p>

                </div>

                <!-- BODY -->
                <div class="body-card">

                    <!-- ALERTA -->
                    <div
                        id="alerta"
                        style="display:none;"
                    ></div>

                    <!-- FORM -->
                    <form id="formIngreso">

                        <!-- PLACA -->
                        <div class="mb-4">

                            <label class="form-label">
                                Placa
                            </label>

                            <input
                                type="text"
                                name="placa"
                                id="placa"
                                class="form-control"
                                required
                                autofocus
                                autocomplete="off"
                                maxlength="10"
                                placeholder="Ej: ABC123"
                            >

                        </div>

                        <!-- TIPO -->
                        <div class="mb-4">

                            <label class="form-label">
                                Tipo Vehículo
                            </label>

                            <select
                                name="tipo"
                                class="form-select"
                            >

                                <option value="Moto">
                                    Moto
                                </option>

                                <option value="Carro">
                                    Carro
                                </option>

                            </select>

                        </div>

                        <!-- MODALIDAD -->
                        <div class="mb-4">

                            <label class="form-label">
                                Modalidad de Cobro
                            </label>

                            <select
                                name="modalidad"
                                class="form-select"
                            >

                                <option value="Hora">
                                    Hora / Fracción
                                </option>

                                <option value="Dia">
                                    Tarifa Día
                                </option>

                                <option value="Noche">
                                    Tarifa Noche
                                </option>

                            </select>

                        </div>

                        <!-- PUESTO CASCO -->
                        <div class="mb-4">

                            <label class="form-label">
                                Casillero de Cascos
                            </label>

                            <select
                                id="puesto_casco"
                                name="puesto_casco"
                                class="form-select"
                            >

                                <option value="">
                                    No deja casco
                                </option>

                                <option value="1">Puesto 1</option>
                                <option value="2">Puesto 2</option>
                                <option value="3">Puesto 3</option>
                                <option value="4">Puesto 4</option>
                                <option value="5">Puesto 5</option>
                                <option value="6">Puesto 6</option>
                                <option value="7">Puesto 7</option>
                                <option value="8">Puesto 8</option>
                                <option value="9">Puesto 9</option>
                                <option value="10">Puesto 10</option>
                                <option value="11">Puesto 11</option>

                            </select>

                        </div>

                        <!-- CANTIDAD CASCOS -->
                        <div class="mb-4">

                            <label class="form-label">
                                Cantidad de Cascos
                            </label>

                            <select
                                id="cantidad_cascos"
                                name="cantidad_cascos"
                                class="form-select"
                                disabled
                            >

                                <option value="0">
                                    0
                                </option>

                                <option value="1">
                                    1
                                </option>

                                <option value="2">
                                    2
                                </option>

                                <option value="3">
                                    3
                                </option>

                                <option value="4">
                                    4
                                </option>

                            </select>

                        </div>

                        <!-- BOTONES -->
                        <div class="d-grid gap-3">

                            <button
                                type="submit"
                                class="btn btn-custom btn-success-custom"
                            >

                                <i class="bi bi-plus-circle"></i>

                                Registrar ingreso

                            </button>

                            <a
                                href="/dashboard/parqueadero"
                                class="btn btn-custom btn-dark-custom"
                            >

                                <i class="bi bi-arrow-left"></i>

                                Volver al dashboard

                            </a>

                        </div>

                    </form>

                    <!-- TIP -->
                    <div class="tip">

                        <i class="bi bi-lightbulb"></i>

                        Puedes escanear o escribir la placa y presionar ENTER para registrar rápidamente.

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

// ==========================================
// RELOJ
// ==========================================
function actualizarFechaHora(){

    const ahora = new Date();

    const dia = String(
        ahora.getDate()
    ).padStart(2, "0");

    const mes = String(
        ahora.getMonth() + 1
    ).padStart(2, "0");

    const anio = ahora.getFullYear();

    const horas = String(
        ahora.getHours()
    ).padStart(2, "0");

    const minutos = String(
        ahora.getMinutes()
    ).padStart(2, "0");

    const segundos = String(
        ahora.getSeconds()
    ).padStart(2, "0");

    document.getElementById(
        "fechaHora"
    ).innerHTML =

        `${dia}/${mes}/${anio} ${horas}:${minutos}:${segundos}`;
}

actualizarFechaHora();

setInterval(
    actualizarFechaHora,
    1000
);


// ==========================================
// FORMULARIO
// ==========================================
const form = document.getElementById(
    "formIngreso"
);

const placaInput = document.getElementById(
    "placa"
);

const puestoCasco = document.getElementById(
    "puesto_casco"
);

const cantidadCascos = document.getElementById(
    "cantidad_cascos"
);


// ==========================================
// CASCOS
// ==========================================
puestoCasco.addEventListener(
    "change",
    function(){

        if(this.value){

            cantidadCascos.disabled = false;

            if(cantidadCascos.value === "0"){

                cantidadCascos.value = "1";
            }

        }else{

            cantidadCascos.disabled = true;

            cantidadCascos.value = "0";
        }
    }
);

// ==========================================
// VALIDAR PLACA
// ==========================================
placaInput.addEventListener(
    "input",
    function(){

        this.value = this.value
            .toUpperCase()
            .replace(/[^A-Z0-9]/g, "");

        if(this.value.length >= 5){

            this.classList.remove(
                "is-invalid"
            );

            this.classList.add(
                "is-valid"
            );

        }else{

            this.classList.remove(
                "is-valid"
            );
        }
    }
);


// ==========================================
// ENTER REGISTRAR
// ==========================================
placaInput.addEventListener(
    "keypress",
    function(e){

        if(e.key === "Enter"){

            e.preventDefault();

            form.requestSubmit();
        }
    }
);


// ==========================================
// REGISTRAR INGRESO
// ==========================================
form.addEventListener(
    "submit",
    async function(e) {

        e.preventDefault();

        const formData = new FormData(form);

        const response = await fetch(
            "/registrar_ingreso",
            {
                method: "POST",
                body: formData
            }
        );

        const data = await response.json();

        const alerta = document.getElementById(
            "alerta"
        );

        // ERROR
        if (!data.success) {

            alerta.style.display = "block";

            alerta.className =
                "alert alert-danger";

            alerta.innerHTML =
                data.message;

            return;
        }

        // SONIDO
        const audio = new Audio(
            "/static/audio/success.mp3"
        );

        audio.play();

        // ==========================================
        // GENERAR TICKET
        // ==========================================
        const ticketHTML =
            generarTicketIngreso(data);


        // ==========================================
        // ABRIR TICKET
        // ==========================================
        abrirTicket(

            ticketHTML,

            data.ticket
        );

        // LIMPIAR
        form.reset();

        placaInput.focus();

        placaInput.classList.remove(
            "is-valid"
        );

        // ALERTA
        alerta.style.display = "block";

        alerta.className =
            "alert alert-success";

        alerta.innerHTML =
            "Vehículo registrado correctamente";

    }
);

</script>
    <script src="/static/js/tickets.js"></script>
</body>

</html>
