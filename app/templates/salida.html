<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Registrar Salida
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        body{

            background:#f1f5f9;

            min-height:100vh;

            display:flex;

            align-items:center;

            justify-content:center;

            font-family:'Segoe UI';
        }

        .card-salida{

            border:none;

            border-radius:28px;

            overflow:hidden;

            box-shadow:0 18px 45px rgba(0,0,0,.18);

            width:100%;

            max-width:520px;
        }

        .header-card{

            background:#dc2626;

            color:white;

            padding:28px;

            text-align:center;
        }

        .header-card h2{

            margin:0;

            font-weight:700;
        }

        .header-card p{

            margin-top:8px;

            margin-bottom:0;

            opacity:.9;
        }

        .body-card{

            padding:35px;
        }

        .form-label{

            font-weight:600;

            color:#334155;
        }

        .form-control{

            border-radius:16px;

            padding:14px;

            border:2px solid #e2e8f0;

            font-size:18px;
        }

        .form-control:focus{

            border-color:#dc2626;

            box-shadow:0 0 0 .2rem rgba(220,38,38,.15);
        }

        .btn-custom{

            border:none;

            border-radius:16px;

            padding:14px;

            font-weight:600;

            font-size:16px;

            transition:.2s;
        }

        .btn-custom:hover{

            transform:translateY(-2px);
        }

        .btn-danger-custom{

            background:#dc2626;

            color:white;
        }

        .btn-danger-custom:hover{

            background:#b91c1c;

            color:white;
        }

        .btn-dark-custom{

            background:#0f172a;

            color:white;
        }

        .btn-dark-custom:hover{

            background:#020617;

            color:white;
        }

        .logo{

            width:120px;

            margin-bottom:18px;
        }

        .tip{

            background:#fef2f2;

            border:1px solid #fecaca;

            color:#991b1b;

            padding:12px;

            border-radius:14px;

            font-size:14px;

            margin-top:20px;
        }

        .is-valid{

            border-color:#16a34a !important;
        }

        .reloj{

            position:absolute;

            top:20px;

            right:20px;

            background:white;

            padding:12px 18px;

            border-radius:14px;

            font-weight:600;

            box-shadow:0 8px 20px rgba(0,0,0,.12);

            color:#0f172a;
        }

    </style>

<meta name="csrf-token" content="{{ csrf_token() }}">
<script src="{{ url_for('static', filename='js/csrf.js') }}" defer></script>

</head>

<body>

<!-- RELOJ -->
<div class="reloj">

    <i class="bi bi-clock"></i>

    <span id="fechaHora"></span>

</div>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <div class="card card-salida">

                <!-- HEADER -->
                <div class="header-card">

                    <img
                        src="/static/img/logocolor.png"
                        class="logo"
                    >

                    <h2>

                        Registrar Salida

                    </h2>

                    <p>

                        Sistema Parqueadero Motorbike

                    </p>

                </div>

                <!-- BODY -->
                <div class="body-card">

                    <!-- ALERTA -->
                    <div
                        id="alerta"
                        style="display:none;"
                    ></div>

                    <!-- FORM -->
                    <form id="formSalida">

                        <!-- TICKET -->
                        <div class="mb-4">

                            <label class="form-label">

                                Número Ticket

                            </label>

                            <input
                                type="number"
                                name="ticket"
                                id="ticket"
                                class="form-control"
                                required
                                autofocus
                                autocomplete="off"
                                placeholder="Ej: 125"
                            >

                        </div>

                        <!-- BOTONES -->
                        <div class="d-grid gap-3">

                            <button
                                type="submit"
                                class="btn btn-custom btn-danger-custom"
                            >

                                <i class="bi bi-box-arrow-right"></i>

                                Registrar salida

                            </button>

                            <a
                                href="/dashboard/parqueadero"
                                class="btn btn-custom btn-dark-custom"
                            >

                                <i class="bi bi-arrow-left"></i>

                                Volver al dashboard

                            </a>

                        </div>

                    </form>

                    <!-- TIP -->
                    <div class="tip">

                        <i class="bi bi-lightbulb"></i>

                        Puedes escanear o escribir el ticket y presionar ENTER para registrar rápidamente.

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="/static/js/tickets_base.js"></script>
<script src="/static/js/tickets.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

// ==========================================
// RELOJ
// ==========================================
function actualizarFechaHora(){

    const ahora = new Date();

    const dia = String(
        ahora.getDate()
    ).padStart(2, "0");

    const mes = String(
        ahora.getMonth() + 1
    ).padStart(2, "0");

    const anio = ahora.getFullYear();

    const horas = String(
        ahora.getHours()
    ).padStart(2, "0");

    const minutos = String(
        ahora.getMinutes()
    ).padStart(2, "0");

    const segundos = String(
        ahora.getSeconds()
    ).padStart(2, "0");

    document.getElementById(
        "fechaHora"
    ).innerHTML =

        `${dia}/${mes}/${anio} ${horas}:${minutos}:${segundos}`;
}

actualizarFechaHora();

setInterval(
    actualizarFechaHora,
    1000
);


// ==========================================
// FORMULARIO
// ==========================================
const form = document.getElementById(
    "formSalida"
);

const ticketInput = document.getElementById(
    "ticket"
);

let salidaPendiente = null;

// ==========================================
// ENTER REGISTRAR
// ==========================================
ticketInput.addEventListener(
    "keypress",
    function(e){

        if(e.key === "Enter"){

            e.preventDefault();

            form.requestSubmit();
        }
    }
);


// ==========================================
// REGISTRAR SALIDA
// ==========================================
form.addEventListener(
    "submit",
    async function(e){

        e.preventDefault();

        const formData = new FormData(form);

        const response = await fetch(
            "/procesar_salida",
            {
                method: "POST",
                body: formData
            }
        );

        const data = await response.json();

        const alerta = document.getElementById(
            "alerta"
        );

        // ERROR
        if(!data.success){

            alerta.style.display = "block";

            alerta.className =
                "alert alert-danger";

            alerta.innerHTML =
                data.message;

            return;
        }

        salidaPendiente = data;

        let mensajeMensualidad = "";

        if(data.valor == 0){

            mensajeMensualidad = `

                <div
                    class="alert alert-info mt-2"
                >

                    <i class="bi bi-star-fill"></i>

                    Vehículo con mensualidad activa

                </div>

            `;
        }

        document.getElementById(
            "detalleSalida"
        ).innerHTML = `

            <div class="mb-2">

                <strong>Placa:</strong>

                ${data.placa}

            </div>

            <div class="mb-2">

                <strong>Tiempo:</strong>

                ${data.tiempo}

            </div>

            <div class="mb-2">

                <strong>Ingreso:</strong>

                ${data.hora_ingreso}

            </div>

            <div class="mb-2">

                <strong>Salida:</strong>

                ${data.hora_salida}

            </div>

            <div class="alert alert-success">

                <strong>

                    Valor calculado:

                    $ ${Number(data.valor).toLocaleString()}

                </strong>

            </div>

            ${mensajeMensualidad}

        `;

        new bootstrap.Modal(

            document.getElementById(
                "modalSalida"
            )

        ).show();
    }
);

window.addEventListener(
    "load",
    function(){

        const btnConfirmar =
            document.getElementById(
                "btnConfirmarSalida"
            );

        if(!btnConfirmar){

            return;

        }

        btnConfirmar.addEventListener(
            "click",
            async function(){

                const formData =
                    new FormData();

                formData.append(
                    "ticket",
                    salidaPendiente.ticket
                );

                const response =
                    await fetch(

                        "/confirmar_salida",

                        {
                            method:"POST",
                            body:formData
                        }

                    );

                const data =
                    await response.json();

                if(!data.success){

                    alert(
                        data.message
                    );

                    return;
                }

                
                // SONIDO
                const audio = new Audio(
                    "/static/audio/success.mp3"
                );

                audio.play();

                // TICKET
                const ticketHTML =
                    generarTicketSalida(

                        salidaPendiente

                    );

                abrirTicket(

                    ticketHTML,

                    salidaPendiente.ticket

                );

                // RECARGAR
                setTimeout(() => {

                    location.reload();

                }, 1000);

            }
        );

    }
);

</script>

<!-- MODAL CONFIRMAR SALIDA -->
<div
    class="modal fade"
    id="modalSalida"
    tabindex="-1"
>

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header bg-danger text-white">

                <h5 class="modal-title">

                    Confirmar salida

                </h5>

                <button
                    type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal"
                ></button>

            </div>

            <div class="modal-body">

                <div id="detalleSalida"></div>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal"
                >

                    Cancelar

                </button>

                <button
                    type="button"
                    class="btn btn-danger"
                    id="btnConfirmarSalida"
                >

                    Confirmar salida

                </button>

            </div>

        </div>

    </div>

</div>

</body>

</html>
