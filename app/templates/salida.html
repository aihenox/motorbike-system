<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Salida Vehículo
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-dark">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card shadow-lg border-0">

                    <div class="card-header bg-danger text-white text-center">

                        <h3>
                            Registrar Salida
                        </h3>

                    </div>

                    <div class="card-body">

                        <div
                            id="alerta"
                            style="display:none;"
                        ></div>

                        <form id="formSalida">

                            <div class="mb-3">

                                <label class="form-label">

                                    Ticket

                                </label>

                                <input
                                    type="number"
                                    name="ticket"
                                    id="ticket"
                                    class="form-control"
                                    required
                                    autofocus
                                >

                            </div>

                            <div class="d-grid gap-2">

                                <button
                                    type="submit"
                                    class="btn btn-danger"
                                >

                                    Registrar Salida

                                </button>

                                <a
                                    href="/dashboard/parqueadero"
                                    class="btn btn-dark"
                                >

                                    Volver

                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        const form = document.getElementById(
            "formSalida"
        );

        form.addEventListener(
            "submit",
            async function(e){

                e.preventDefault();

                const formData = new FormData(form);

                const response = await fetch(
                    "/procesar_salida",
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await response.json();

                const alerta = document.getElementById(
                    "alerta"
                );

                // ==========================================
                // ERROR
                // ==========================================
                if(!data.success){

                    alerta.style.display = "block";

                    alerta.className =
                        "alert alert-danger";

                    alerta.innerHTML =
                        data.message;

                    return;
                }

                // ==========================================
                // MENSAJE OK
                // ==========================================
                alerta.style.display = "block";

                alerta.className =
                    "alert alert-success";

                alerta.innerHTML =
                    "Salida registrada correctamente";

                // ==========================================
                // LIMPIAR
                // ==========================================
                form.reset();

                document.getElementById(
                    "ticket"
                ).focus();

                // ==========================================
                // ESPERAR PDF
                // ==========================================
                setTimeout(() => {

                    window.open(
                        data.pdf_url,
                        "_blank"
                    );

                }, 1500);

            }
        );

    </script>

</body>

</html>
