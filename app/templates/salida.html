<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Salida Vehículo
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-dark">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-lg border-0">

                <div class="card-header bg-danger text-white text-center">

                    <h3>
                        Registrar Salida
                    </h3>

                </div>

                <div class="card-body">

                    <div
                        id="alerta"
                        style="display:none;"
                    ></div>

                    <form id="formSalida">

                        <div class="mb-3">

                            <label class="form-label">

                                Ticket

                            </label>

                            <input
                                type="number"
                                name="ticket"
                                id="ticket"
                                class="form-control"
                                required
                                autofocus
                            >

                        </div>

                        <div class="d-grid gap-2">

                            <button
                                type="submit"
                                class="btn btn-danger"
                            >

                                Registrar Salida

                            </button>

                            <a
                                href="/dashboard/parqueadero"
                                class="btn btn-dark"
                            >

                                Volver

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const form = document.getElementById(
    "formSalida"
);

form.addEventListener(
    "submit",
    async function(e){

        e.preventDefault();

        const formData = new FormData(form);

        const response = await fetch(
            "/procesar_salida",
            {
                method: "POST",
                body: formData
            }
        );

        const data = await response.json();

        const alerta = document.getElementById(
            "alerta"
        );

        if(!data.success){

            alerta.style.display = "block";

            alerta.className =
                "alert alert-danger";

            alerta.innerHTML =
                data.message;

            return;
        }

        // ==========================================
        // TICKET HTML
        // ==========================================
        const ticketHTML = `

            <html>

            <head>

                <title>
                    Ticket Salida
                </title>

                <style>

                    body {

                        font-family: Arial;

                        width: 300px;

                        margin: auto;

                        text-align: center;
                    }

                    .logo {

                        width: 120px;

                        margin-bottom: 10px;
                    }

                    .ticket {

                        font-size: 28px;

                        font-weight: bold;

                        margin: 15px 0;
                    }

                    .linea {

                        border-top: 1px dashed #000;

                        margin: 12px 0;
                    }

                    .dato {

                        display: flex;

                        justify-content: space-between;

                        margin: 8px 0;
                    }

                    .total {

                        font-size: 32px;

                        font-weight: bold;

                        margin-top: 20px;
                    }

                </style>

            </head>

            <body onload="window.print()">

                <img
                    src="/static/img/logo.png"
                    class="logo"
                >

                <h2>
                    RECIBO SALIDA
                </h2>

                <div class="linea"></div>

                <div class="ticket">

                    #${data.ticket}

                </div>

                <div class="linea"></div>

                <div class="dato">

                    <span>
                        PLACA
                    </span>

                    <strong>
                        ${data.placa}
                    </strong>

                </div>

                <div class="dato">

                    <span>
                        TIPO
                    </span>

                    <strong>
                        ${data.tipo}
                    </strong>

                </div>

                <div class="dato">

                    <span>
                        TIEMPO
                    </span>

                    <strong>
                        ${data.tiempo}
                    </strong>

                </div>

                <div class="linea"></div>

                <div class="total">

                    $ ${data.valor}

                </div>

                <div class="linea"></div>

                <p>

                    ¡Gracias por su visita!

                </p>

            </body>

            </html>

        `;

        const ventana = window.open(
            "",
            "_blank",
            "width=400,height=700"
        );

        ventana.document.write(
            ticketHTML
        );

        ventana.document.close();

        // ==========================================
        // LIMPIAR
        // ==========================================
        form.reset();

        document.getElementById(
            "ticket"
        ).focus();

        alerta.style.display = "block";

        alerta.className =
            "alert alert-success";

        alerta.innerHTML =
            "Salida registrada correctamente";

    }
);

</script>

</body>

</html>
