<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>

        {% if mensualidad %}

            Editar Mensualidad

        {% else %}

            Nueva Mensualidad

        {% endif %}

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>

                {% if mensualidad %}

                    Editar Mensualidad

                {% else %}

                    Nueva Mensualidad

                {% endif %}

            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <!-- PLACA -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">

                            <i class="bi bi-credit-card"></i>

                            Placa

                        </label>

                        <input
                            type="text"
                            name="placa"
                            class="form-control"
                            required
                            maxlength="10"
                            style="text-transform:uppercase"
                            value="{{ mensualidad.placa if mensualidad else '' }}"
                        >

                    </div>

                    <!-- TIPO -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">

                            <i class="bi bi-car-front"></i>

                            Tipo

                        </label>

                        <select
                            name="tipo"
                            class="form-select"
                        >

                            <option
                                value="Moto"
                                {% if mensualidad and mensualidad.tipo == "Moto" %}
                                    selected
                                {% endif %}
                            >
                                Moto
                            </option>

                            <option
                                value="Carro"
                                {% if mensualidad and mensualidad.tipo == "Carro" %}
                                    selected
                                {% endif %}
                            >
                                Carro
                            </option>

                        </select>

                    </div>

                </div>

                <div class="row">

                    <!-- PROPIETARIO -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">

                            <i class="bi bi-person"></i>

                            Propietario

                        </label>

                        <input
                            type="text"
                            name="propietario"
                            class="form-control"
                            value="{{ mensualidad.propietario if mensualidad else '' }}"
                        >

                    </div>

                    <!-- TELEFONO -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">

                            <i class="bi bi-telephone"></i>

                            Teléfono

                        </label>

                        <input
                            type="text"
                            name="telefono"
                            class="form-control"
                            value="{{ mensualidad.telefono if mensualidad else '' }}"
                        >

                    </div>

                </div>

                <div class="row">

                    <!-- FECHA INICIO -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">

                            <i class="bi bi-calendar-event"></i>

                            Fecha inicio

                        </label>

                        <input
                            type="date"
                            name="fecha_inicio"
                            class="form-control"
                            value="{{ mensualidad.fecha_inicio if mensualidad else '' }}"
                        >

                    </div>

                    <!-- FECHA FIN -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">

                            <i class="bi bi-calendar-check"></i>

                            Fecha vencimiento

                        </label>

                        <input
                            type="date"
                            name="fecha_fin"
                            class="form-control"
                            value="{{ mensualidad.fecha_fin if mensualidad else '' }}"
                        >

                    </div>

                </div>

                <!-- ESTADO -->
                <div class="mb-4">

                    <label class="form-label fw-bold">

                        <i class="bi bi-check-circle"></i>

                        Estado

                    </label>

                    <select
                        name="estado"
                        class="form-select"
                    >

                        <option
                            value="Activa"
                            {% if mensualidad and mensualidad.estado == "Activa" %}
                                selected
                            {% endif %}
                        >
                            Activa
                        </option>

                        <option
                            value="Inactiva"
                            {% if mensualidad and mensualidad.estado == "Inactiva" %}
                                selected
                            {% endif %}
                        >
                            Inactiva
                        </option>

                    </select>

                </div>

                <!-- BOTONES -->
                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-success"
                    >

                        <i class="bi bi-save"></i>

                        {% if mensualidad %}

                            Actualizar

                        {% else %}

                            Guardar

                        {% endif %}

                    </button>

                    <a
                        href="/mensualidades"
                        class="btn btn-secondary"
                    >

                        <i class="bi bi-arrow-left"></i>

                        Cancelar

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
