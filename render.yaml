services:

  - type: web

    name: motorbike-system

    env: python

    plan: free

    buildCommand: |

      pip install -r requirements.txt

    startCommand: |

      gunicorn run:app

    envVars:

      - key: PYTHON_VERSION
        value: 3.11.9

      - key: SECRET_KEY
        generateValue: true

      - key: ADMIN_PASSWORD
        sync: false

      - key: FLASK_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: motorbike-db
          property: connectionString

    autoDeploy: true


databases:

  - name: motorbike-db

    databaseName: motorbike

    user: motorbike_user

    plan: free
